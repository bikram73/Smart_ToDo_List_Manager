<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="fas fa-check-double me-2"></i>Smart To-Do</span>
            <div>
                <a href="profile.html" class="btn btn-primary btn-sm me-2">Profile</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Stats Row -->
        <div class="row mb-4 g-3">
            <div class="col-4">
                <div class="card text-center p-2 p-md-3 card-glow-primary">
                    <h3 class="text-primary" id="totalTasks">0</h3>
                    <small class="text-white">Total Tasks</small>
                </div>
            </div>
            <div class="col-4">
                <div class="card text-center p-2 p-md-3 card-glow-success">
                    <h3 class="text-success" id="completedTasks">0</h3>
                    <small class="text-white">Completed</small>
                </div>
            </div>
            <div class="col-4">
                <div class="card text-center p-2 p-md-3 card-glow-warning">
                    <h3 class="text-warning" id="pendingTasks">0</h3>
                    <small class="text-white">Pending</small>
                </div>
            </div>
        </div>

        <!-- Calendar -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button class="btn btn-sm btn-outline-secondary" onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
                    <h5 class="mb-0" id="currentMonth">Month</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="calendar"></div>
            </div>
        </div>

        <!-- Add Task -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Add New Task</h5>
                <div class="row g-2">
                    <div class="col-md-6"><input type="text" id="newTaskInput" class="form-control" placeholder="What needs to be done?"></div>
                    <div class="col-md-2"><input type="date" id="taskDate" class="form-control"></div>
                    <div class="col-md-2"><input type="time" id="startTime" class="form-control"></div>
                    <div class="col-md-2"><input type="time" id="endTime" class="form-control"></div>
                    <button class="btn btn-primary" onclick="addTask()"><i class="fas fa-plus"></i> Add</button>
                </div>
            </div>
        </div>

        <!-- Task List -->
        <h5 class="mb-3" id="tasksHeader">Your Tasks</h5>
        <div id="taskList" class="row g-3">
            <!-- Tasks will be injected here -->
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label">Task Name</label>
                        <input type="text" class="form-control" id="editTaskInput">
                    </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Start Time</label>
                        <input type="time" class="form-control" id="editStartTime">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-control" id="editEndTime">
                    </div>
                </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEditedTask()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteTaskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-danger">Delete Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this task? This action cannot be undone.</p>
                    <input type="hidden" id="deleteTaskId">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDeleteTask()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // Toast Notification Logic
        function showToast(message, type = 'primary') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            
            let icon = '<i class="fas fa-info-circle"></i>';
            if (type === 'success') icon = '<i class="fas fa-check-circle text-success"></i>';
            if (type === 'danger') icon = '<i class="fas fa-exclamation-circle text-danger"></i>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Check for fresh login
        if (localStorage.getItem('loginSuccess')) {
            localStorage.removeItem('loginSuccess');
            // Fetch profile to get name
            fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                showToast(`Welcome back, ${data.username}!`, 'success');
            })
            .catch(() => showToast('Welcome back!', 'success'));
        }

        async function fetchTasks() {
            try {
                const response = await fetch('/api/todos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) logout();
                const tasks = await response.json();
                
                // Filter to show only today's tasks initially
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const todayStr = `${year}-${month}-${day}`;
                
                const todayTasks = tasks.filter(t => t.task_date === todayStr);
                
                renderTasks(todayTasks);
                updateStats(tasks);
                renderCalendar(tasks); // Update calendar with task data
                
                const header = document.getElementById('tasksHeader');
                if(header) header.innerText = `Tasks for Today`;
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const isCompleted = task.status === 'completed';
                const isPast = task.task_date && new Date(task.task_date) < new Date(new Date().toDateString());
                
                let timeDisplay = '';
                if (task.start_time && task.end_time) {
                    timeDisplay = `<small class="text-muted d-block"><i class="far fa-clock me-1"></i>${task.start_time} - ${task.end_time}</small>`;
                }

                const card = `
                    <div class="col-12">
                        <div class="card task-card">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <button class="btn btn-sm ${isCompleted ? 'btn-success' : 'btn-outline-secondary'} me-3 rounded-circle" 
                                            onclick="toggleComplete(${task.id}, ${!isCompleted})" 
                                            style="width: 32px; height: 32px;">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <div>
                                        <h6 class="mb-0 ${isCompleted ? 'completed-task' : ''}">${task.task}</h6>
                                        <span class="badge ${isCompleted ? 'bg-success' : 'bg-warning'} status-badge">${task.status}</span>
                                        ${timeDisplay}
                                    </div>
                                </div>
                                <div>
                                    ${!isCompleted && isPast ? `<button class="btn btn-sm btn-outline-info me-1" onclick="moveToToday(${task.id})" title="Move to Today"><i class="fas fa-calendar-day"></i></button>` : ''}
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editTask(${task.id}, '${task.task}', '${task.start_time || ''}', '${task.end_time || ''}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        function updateStats(tasks) {
            document.getElementById('totalTasks').innerText = tasks.length;
            document.getElementById('completedTasks').innerText = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('pendingTasks').innerText = tasks.filter(t => t.status === 'pending').length;
        }

        async function addTask() {
            const input = document.getElementById('newTaskInput');
            const task = input.value.trim();
            const taskDate = document.getElementById('taskDate').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (!task) return;

            await fetch('/api/todos', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ 
                    task, 
                    task_date: taskDate || null, 
                    start_time: startTime ? startTime + ":00" : null, 
                    end_time: endTime ? endTime + ":00" : null 
                })
            });
            input.value = '';
            fetchTasks();
        }

        async function toggleComplete(id, isComplete) {
            if (isComplete) {
                await fetch(`/api/todos/${id}/complete`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } else {
                // Optional: Add endpoint to un-complete if needed, or just update status
                await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: 'pending' })
                });
            }
            fetchTasks();
        }

        // Modal Logic for Delete
        let deleteModal;
        function deleteTask(id) {
            document.getElementById('deleteTaskId').value = id;
            deleteModal = new bootstrap.Modal(document.getElementById('deleteTaskModal'));
            deleteModal.show();
        }

        async function confirmDeleteTask() {
            const id = document.getElementById('deleteTaskId').value;
            await fetch(`/api/todos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            deleteModal.hide();
            showToast('Task deleted successfully', 'success');
            fetchTasks();
        }

        // Modal Logic for Edit
        let editModal;
        function editTask(id, currentTask, startTime, endTime) {
            document.getElementById('editTaskId').value = id;
            document.getElementById('editTaskInput').value = currentTask;
            document.getElementById('editStartTime').value = startTime && startTime !== 'null' ? startTime.slice(0, 5) : '';
            document.getElementById('editEndTime').value = endTime && endTime !== 'null' ? endTime.slice(0, 5) : '';
            editModal = new bootstrap.Modal(document.getElementById('editTaskModal'));
            editModal.show();
        }

        async function saveEditedTask() {
            const id = document.getElementById('editTaskId').value;
            const newTask = document.getElementById('editTaskInput').value;
            const startTime = document.getElementById('editStartTime').value;
            const endTime = document.getElementById('editEndTime').value;

            const body = { 
                task: newTask,
                start_time: startTime ? startTime + ":00" : null,
                end_time: endTime ? endTime + ":00" : null
            };
            
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(body)
            });
            editModal.hide();
            showToast('Task updated successfully', 'success');
            fetchTasks();
        }

        async function moveToToday(id) {
            await fetch(`/api/todos/${id}/move-to-today`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            fetchTasks();
        }

        function logout() { 
            localStorage.removeItem('token'); 
            localStorage.setItem('logoutSuccess', 'true');
            window.location.href = 'login.html'; 
        }

        // Init
        fetchTasks();
    </script>
    <script src="calendar.js"></script>
</body>
</html>
